name: sql-learn

services:
  mysql:
    image: mysql:8.0
    container_name: sql-learn-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gameverse}
      MYSQL_USER: ${MYSQL_USER:-gameadmin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-mysql.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - sql-learn-network

  postgres:
    image: postgres:16
    container_name: sql-learn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-gameverse}
      POSTGRES_USER: ${POSTGRES_USER:-gameadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gameadmin} -d ${POSTGRES_DATABASE:-gameverse}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sql-learn-network

  adminer:
    image: adminer:latest
    container_name: sql-learn-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - mysql
      - postgres
    networks:
      - sql-learn-network

volumes:
  mysql_data:
    driver: local
  postgres_data:
    driver: local

networks:
  sql-learn-network:
    driver: bridge
